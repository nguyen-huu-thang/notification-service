# Notification Service — Runtime Configuration
# Operator-configurable. Không commit thông tin nhạy cảm thật.
# Xem thêm: application-local.yml (gitignored) cho override cục bộ.

grpc:
  port: 50052
  # mTLS động: cert lấy từ TrustGrpcCertificateProvider (config/grpc.py),
  # không dùng cert_file/key_file tĩnh. Rotate cert không cần restart.
  tls:
    enabled: true
    mutual: true
  # Outbound clients. "trust" khớp configure_grpc_clients("trust", ...) trong
  # config/grpc.py. dynamic: true → channel tự rebuild khi cert rotate.
  clients:
    trust:
      host: "localhost"      # = trust.grpc.host
      port: 9090             # = trust.grpc.port
      deadline_ms: 3000
      tls:
        enabled: true
        dynamic: true

database:
  url: "postgresql+asyncpg://thang:123456@localhost:5432/notification_service"
  pool_size: 5
  max_overflow: 10
  echo: false

smtp:
  host: "localhost"
  port: 1025            # MailHog cho dev
  username: ""
  password: ""
  use_tls: false
  sender: "noreply@xime.local"

template:
  dir: "app/infrastructure/template/templates"

trust:
  grpc:
    host: "localhost"
    port: 9090
  service_id: "notification-service"
  # Bootstrap file — chứa cert ban đầu, xóa sau khi đổi cert lần đầu
  bootstrap:
    path: "./runtime/security/bootstrap.txt"
  # Root CA cert PEM — dùng để verify Trust Service trong mTLS
  ca_cert:
    path: "./runtime/security/ca.pem"
  # Fernet key mã hóa private_key & refresh_token trước khi lưu DB.
  # Phải ổn định giữa các lần chạy. Override qua env TRUST_CERT_ENCRYPTION_KEY.
  cert_encryption_key: "Zlv8oRUMO-Oywbla3KsY3OpzpBrFYMXjETfzehKna6A="

