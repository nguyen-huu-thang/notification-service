syntax = "proto3";
package notification;

service NotificationService {
  rpc SendOtpEmail (SendOtpEmailRequest)  returns (SendOtpEmailResponse);
  rpc VerifyOtp    (VerifyOtpRequest)     returns (VerifyOtpResponse);
  rpc SendEmail    (SendEmailRequest)     returns (SendEmailResponse);
}

// ── SendOtpEmail ──────────────────────────────────────────────────────────────

message SendOtpEmailRequest {
  string channel    = 1;  // "EMAIL" | "PHONE"
  string target     = 2;  // email hoặc phone
  string otp_type   = 3;  // "VERIFY_EMAIL" | "RESET_PASSWORD" | "LOGIN_MFA" | "VERIFY_PHONE"
  bytes  context_id = 4;  // optional — identity_id, user_id, v.v.
}

message SendOtpEmailResponse {
  bytes otp_id     = 1;
  int64 expires_at = 2;  // Unix timestamp (seconds)
}

// ── VerifyOtp ─────────────────────────────────────────────────────────────────

message VerifyOtpRequest {
  bytes  otp_id = 1;
  string code   = 2;  // 6-digit code người dùng nhập
}

message VerifyOtpResponse {
  bool success = 1;
}

// ── SendEmail ─────────────────────────────────────────────────────────────────

message SendEmailRequest {
  string to            = 1;
  string subject       = 2;
  string template_name = 3;
  string template_data = 4;  // JSON object string: {"key": "value"}
}

message SendEmailResponse {
  bytes notification_id = 1;
}
